version: "3.9"

services:
  backend:
    build: ./backend
    container_name: sentiment_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/model/saved:/app/model/saved
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: sentiment_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped